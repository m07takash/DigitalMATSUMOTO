USER_FOLDER: "user/"
SESSION_FOLDER_PREFIX: "session"
SESSION_FILE_NAME: "chat_memory.json"
SESSION_STATUS_FILE_NAME: "status.yaml"
SESSION_CONTENTS_FOLDER: "contents/"
SESSION_ANALYTICS_FOLDER: "analytics/"
ARCHIVE_FOLDER: "user/archive/"
ARCHIVE_DAYS: 30
AGENT_FOLDER: "user/common/agent/"
CHARACTER_FOLDER: "user/common/agent/character/"
PRACTICE_FOLDER: "user/common/practice/"
MST_FOLDER: "user/common/mst/"
RAG_FOLDER_DB: "user/common/rag/chromadb/"
RAG_FOLDER_PAGES: "user/common/rag/pages/"
RAG_DATA_CSV_FOLDER: "user/common/csv/"
USER_MEMORY_FOLDER: "user/common/user_memory/"
TEMP_FOLDER: "user/common/temp/"
TEST_FOLDER: "test/"
# NOTE: scheduled-job settings have been migrated to user/common/mst/scheduled_jobs.json.
# Edit them from the Scheduler menu in the WebUI.
# Maximum number of agent personas to run in parallel (ThreadPoolExecutor max_workers
# when sending to multiple personas simultaneously)
MAX_PARALLEL_PERSONAS: 4
# Maximum number of personas auto-selected in Thinking Mode (default for the WebUI "Max Personas" input)
MAX_PERSONAS: 3
# Default web-search engine (choose one of OpenAI, Perplexity, Google)
WEB_SEARCH_DEFAULT: "OpenAI"
PERPLEXITY_URL: "https://api.perplexity.ai/chat/completions"
PERPLEXITY_MODEL: "sonar"
PERPLEXITY_SYSTEM_PROMPT: "Be precise and concise."
PERPLEXITY_USER_PROMPT: "以下の入力に基づいて、関連する情報を提供してください。"
PERPLEXITY_MAX_TOKENS: 2000
PERPLEXITY_REASONING_EFFORT: "medium"
OPENAI_SEARCH_MODEL: "gpt-5-mini"
OPENAI_SEARCH_SYSTEM_PROMPT: "Be precise and concise."
OPENAI_SEARCH_USER_PROMPT: "以下の入力に基づいて、関連する情報を提供してください。"
GOOGLE_SEARCH_MODEL: "gemini-2.5-flash-preview-05-20"
GOOGLE_SEARCH_USER_PROMPT: "以下の入力に基づいて、関連する情報を提供してください。"
URL_FETCH:
  TIMEOUT: 10
  MAX_BYTES: 2097152
  MAX_SUBPAGES: 5
  MAX_DEPTH: 1
  USER_AGENT: "DigiMatsuAgent/1.0 (+URL fetch)"
  # Extra domains to deny (subdomains are denied recursively)
  BLOCKED_DOMAINS: []
  # When non-empty, switches to whitelist mode (only listed domains are allowed)
  ALLOWED_DOMAINS: []
  # Path to an external blocklist in hosts format (`0.0.0.0 example.com`) or one-domain-per-line
  # Recommended public lists:
  #   - StevenBlack/hosts (adult + gambling + malware etc.): https://github.com/StevenBlack/hosts
  #   - UT1 blacklists (by category: adult / malware / phishing / warez, etc.): https://dsi.ut-capitole.fr/blacklists/
  #   - Hagezi DNS blocklists: https://github.com/hagezi/dns-blocklists
  # Example: BLOCKLIST_FILE: "user/common/mst/blocklist_hosts.txt"
  BLOCKLIST_FILE: ""
  BLOCKED_EXTENSIONS:
    - ".exe"
    - ".bat"
    - ".cmd"
    - ".msi"
    - ".scr"
    - ".dll"
    - ".vbs"
    - ".ps1"
    - ".jar"
    - ".apk"
    - ".dmg"