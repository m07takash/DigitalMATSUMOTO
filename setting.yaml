USER_FOLDER: "user/"
SESSION_FOLDER_PREFIX: "session"
SESSION_FILE_NAME: "chat_memory.json"
SESSION_STATUS_FILE_NAME: "status.yaml"
SESSION_CONTENTS_FOLDER: "contents/"
SESSION_ANALYTICS_FOLDER: "analytics/"
ARCHIVE_FOLDER: "user/archive/"
ARCHIVE_DAYS: 30
AGENT_FOLDER: "user/common/agent/"
CHARACTER_FOLDER: "user/common/agent/character/"
PRACTICE_FOLDER: "user/common/practice/"
MST_FOLDER: "user/common/mst/"
RAG_FOLDER_DB: "user/common/rag/chromadb/"
RAG_FOLDER_PAGES: "user/common/rag/pages/"
RAG_DATA_CSV_FOLDER: "user/common/csv/"
TEMP_FOLDER: "user/common/temp/"
TEST_FOLDER: "test/"
# エージェントペルソナの並列実行上限（複数ペルソナ同時送信時のThreadPoolExecutor max_workers）
MAX_PARALLEL_PERSONAS: 4
# Thinking Modeでpersonaを自動選定する際の最大人数（WebUI Max Personas入力の既定値）
MAX_PERSONAS: 3
WEB_SEARCH_DEFAULT: "Perplexity"
PERPLEXITY_URL: "https://api.perplexity.ai/chat/completions"
PERPLEXITY_MODEL: "sonar"
PERPLEXITY_SYSTEM_PROMPT: "Be precise and concise."
PERPLEXITY_USER_PROMPT: "以下の入力に基づいて、関連する情報を提供してください。"
PERPLEXITY_MAX_TOKENS: 2000
PERPLEXITY_REASONING_EFFORT: "medium"
OPENAI_SEARCH_MODEL: "gpt-5-mini"
OPENAI_SEARCH_SYSTEM_PROMPT: "Be precise and concise."
OPENAI_SEARCH_USER_PROMPT: "以下の入力に基づいて、関連する情報を提供してください。"
GOOGLE_SEARCH_MODEL: "gemini-2.5-flash-preview-05-20"
GOOGLE_SEARCH_USER_PROMPT: "以下の入力に基づいて、関連する情報を提供してください。"
URL_FETCH:
  TIMEOUT: 10
  MAX_BYTES: 2097152
  MAX_SUBPAGES: 5
  MAX_DEPTH: 1
  USER_AGENT: "DigiMatsuAgent/1.0 (+URL fetch)"
  # 追加で拒否したいドメイン（サブドメインも再帰的に拒否）
  BLOCKED_DOMAINS: []
  # 非空の場合はホワイトリストモード（列挙ドメインのみ許可）
  ALLOWED_DOMAINS: []
  # hosts形式 (`0.0.0.0 example.com`) または 1行1ドメインの外部ブロックリストへのパス
  # 推奨公開リスト:
  #   - StevenBlack/hosts (adult+gambling+malware等): https://github.com/StevenBlack/hosts
  #   - UT1 blacklists (カテゴリ別: adult / malware / phishing / warez 等): https://dsi.ut-capitole.fr/blacklists/
  #   - Hagezi DNS blocklists: https://github.com/hagezi/dns-blocklists
  # 例: BLOCKLIST_FILE: "user/common/mst/blocklist_hosts.txt"
  BLOCKLIST_FILE: ""
  BLOCKED_EXTENSIONS:
    - ".exe"
    - ".bat"
    - ".cmd"
    - ".msi"
    - ".scr"
    - ".dll"
    - ".vbs"
    - ".ps1"
    - ".jar"
    - ".apk"
    - ".dmg"